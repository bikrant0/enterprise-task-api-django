<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Task Manager</title>
    <!-- Import Bootstrap 5 for clean, professional styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .hidden {
            display: none !important;
        }

        .task-card {
            transition: transform 0.2s;
        }

        .task-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>

    <!-- Navigation Bar -->
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">Enterprise Task Manager</span>
            <button id="logoutBtn" class="btn btn-outline-light btn-sm hidden" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container">

        <!-- 1. LOGIN SECTION -->
        <div id="loginSection" class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title text-center mb-4">API Login</h5>
                        <form id="loginForm" onsubmit="handleLogin(event)">
                            <div class="mb-3">
                                <label class="form-label">Username / Email</label>
                                <input type="text" class="form-control" id="username" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" class="form-control" id="password" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Login & Get JWT Token</button>
                            <div id="loginError" class="text-danger mt-2 small text-center hidden">Invalid
                                credentials.
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- 2. DASHBOARD SECTION (Hidden until logged in) -->
        <div id="dashboardSection" class="hidden">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h3>My Tasks</h3>
                <button class="btn btn-success btn-sm">+ New Task</button>
            </div>

            <!-- Task List Container -->
            <div class="row" id="taskList">

            </div>
        </div>

    </div>

    <script>
        // ==========================================
        // BACKEND CONFIGURATION
        // Point this to your live Render API or Localhost!
        // ==========================================
        const API_BASE_URL = 'http://127.0.0.1:8000/api';
        // If testing live, change to: 'https://enterprise-task-api-django.onrender.com/api'

        let jwtAccessToken = null;

        // --- 1. Authentication Logic ---
        async function handleLogin(event) {
            event.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('loginError');

            try {
                // POST request to your Django Auth Endpoint
                const response = await fetch(`${API_BASE_URL}/auth/login/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    jwtAccessToken = data.access; // JWT token

                    // Hide Login, Show Dashboard
                    document.getElementById('loginSection').classList.add('hidden');
                    document.getElementById('dashboardSection').classList.remove('hidden');
                    document.getElementById('logoutBtn').classList.remove('hidden');

                    // Fetch the user's tasks using the new token
                    fetchTasks();
                } else {
                    errorDiv.classList.remove('hidden');
                }
            } catch (error) {
                console.error("Login failed:", error);
                alert("Could not connect to the API. Is your Django server running?");
            }
        }

        //  2. Fetch Tasks Logic 
        async function fetchTasks() {
            const taskListDiv = document.getElementById('taskList');
            taskListDiv.innerHTML = '<div class="text-center w-100">Loading tasks...</div>';

            try {
                // GET request to your Django Tasks Endpoint
                const response = await fetch(`${API_BASE_URL}/tasks/`, {
                    method: 'GET',
                    headers: {
                        // This is how we prove to Django who we are!
                        'Authorization': `Bearer ${jwtAccessToken}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    // If you are using Pagination, data might be inside data.results
                    const data = await response.json();
                    const tasks = data.results ? data.results : data;

                    renderTasks(tasks);
                } else {
                    alert("Session expired or unauthorized. Please login again.");
                    logout();
                }
            } catch (error) {
                console.error("Failed to fetch tasks:", error);
            }
        }

        // 3. UI Rendering Logic 
        function renderTasks(tasks) {
            const taskListDiv = document.getElementById('taskList');
            taskListDiv.innerHTML = ''; // Clear loading text

            if (tasks.length === 0) {
                taskListDiv.innerHTML = '<div class="alert alert-info">No tasks found. Create one!</div>';
                return;
            }

            tasks.forEach(task => {
                // Check status for color coding
                const badgeColor = task.status === 'DONE' ? 'bg-success' :
                    (task.status === 'IN_PROGRESS' ? 'bg-warning' : 'bg-secondary');

                // Build the Bootstrap Card HTML
                const cardHtml = `
                <div class="col-md-6 mb-3">
                    <div class="card task-card h-100 border-0 shadow-sm">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <h5 class="card-title text-primary mb-0">${task.title}</h5>
                                <span class="badge ${badgeColor}">${task.status}</span>
                            </div>
                            <p class="card-text text-muted small">${task.description || 'No description provided.'}</p>
                            <hr>
                            <p class="mb-0 small text-secondary">
                                <strong>Notes:</strong> ${task.notes ? task.notes.length : 0} attached
                            </p>
                        </div>
                    </div>
                </div>
            `;
                taskListDiv.innerHTML += cardHtml;
            });
        }

        function logout() {
            jwtAccessToken = null;
            document.getElementById('loginSection').classList.remove('hidden');
            document.getElementById('dashboardSection').classList.add('hidden');
            document.getElementById('logoutBtn').classList.add('hidden');
            document.getElementById('loginForm').reset();
        }
    </script>

</body>

</html>
