version: '3.8'

services:
  db:
    image: postgres:15
    container_name: enterprise_db
    environment:
      POSTGRES_DB: enterprise_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
    ports:
      - "5466:5432" 
    volumes:
      - enterprise_postgres_data:/var/lib/postgresql/data

volumes:
  enterprise_postgres_data: